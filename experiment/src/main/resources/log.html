<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth API — Historical Logs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        /* I've included your exact styles here to ensure the page looks perfect */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:        #0d0f0e;
            --surface:   #141816;
            --border:    #1f2421;
            --border2:   #2a3030;
            --green:     #3ddc84;
            --green-dim: #1e6e42;
            --red:       #ff5c5c;
            --yellow:    #f0c040;
            --text:      #c8d8cc;
            --text-dim:  #5a7060;
            --text-mid:  #8faa96;
        }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.6; }
        .shell { display: grid; grid-template-rows: 48px 1fr; height: 100vh; overflow: hidden; }
        .topbar { display: flex; align-items: center; gap: 12px; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .topbar-title { color: var(--text-mid); font-size: 12px; letter-spacing: 0.08em; }
        .topbar-title span { color: var(--green); }
        .nav-link { margin-left: auto; color: var(--green); text-decoration: none; font-size: 10px; padding: 4px 8px; border: 1px solid var(--green-dim); border-radius: 3px; }
        .log-panel { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
        .log-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }
        .log-entries { flex: 1; overflow-y: auto; padding: 12px 20px; }
        .entry { margin-bottom: 16px; animation: fadeIn 0.2s ease; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        .entry-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 10px; color: var(--text-dim); }
        .status-chip { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 2px; margin-left: auto; }
        .s2xx { background: #1a3a25; color: var(--green); }
        .s4xx { background: #3a1a1a; color: var(--red); }
        .entry-req, .entry-res { border-left: 2px solid var(--border2); padding: 6px 10px; margin-bottom: 3px; font-size: 12px; white-space: pre-wrap; word-break: break-all; color: var(--text-mid); }
        .entry-res { border-color: var(--green-dim); color: var(--text); }
        .entry-line-label { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
        .btn { background: transparent; border: 1px solid var(--green-dim); color: var(--green); font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 5px 12px; cursor: pointer; border-radius: 3px; }
        .btn-danger { border-color: #6e2020; color: var(--red); }
        .btn-danger:hover { background: rgba(255, 92, 92, 0.08); border-color: var(--red); }
        @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; } }
    </style>
</head>
<body>
<div class="shell">
    <header class="topbar">
        <div class="topbar-title">auth-api // <span>persisted-server-logs</span></div>
        <a href="/" class="nav-link">← RETURN TO CONSOLE</a>
    </header>

    <main class="log-panel">
        <div class="log-header">
            <div class="left">HISTORICAL RECORD</div>
            <button class="btn btn-danger" onclick="clearServerLogs()">PURGE BACKEND</button>
        </div>
        <div class="log-entries" id="log-list">
        </div>
    </main>
</div>

<script>
    window.onload = loadLogs;

    async function loadLogs() {
        const res = await fetch('/api/internal/logs');
        const logs = await res.json();
        const list = document.getElementById('log-list');

        if (logs.length === 0) {
            list.innerHTML = '<div style="text-align:center; padding-top:40px; color:var(--text-dim);">No history found.</div>';
            return;
        }

        list.innerHTML = logs.map(entry => `
      <div class="entry">
        <div class="entry-meta">
          <span>[${entry.timestamp}]</span>
          <span style="color:var(--green)">${entry.method}</span>
          <span>${entry.endpoint}</span>
          <span class="status-chip ${entry.status >= 400 ? 's4xx' : 's2xx'}">${entry.status}</span>
        </div>
        <div class="entry-line-label">REQUEST</div>
        <div class="entry-req">${entry.requestBody}</div>
        <div class="entry-line-label">RESPONSE</div>
        <div class="entry-res">${entry.responseBody}</div>
      </div>
    `).join('');
    }

    async function clearServerLogs() {
        if(confirm("Delete all persisted logs?")) {
            await fetch('/api/internal/logs', { method: 'DELETE' });
            loadLogs();
        }
    }
</script>
</body>
</html>
