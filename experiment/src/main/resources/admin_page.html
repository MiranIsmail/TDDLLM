<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Terminal Admin // Root</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0d0f0e;
            --surface:   #141816;
            --border:    #1f2421;
            --accent:    #3ddc84;
            --accent-dim: #1e6e42;
            --yellow:    #f0c040;
            --red:       #ff5c5c;
            --red-dim:   #4a1c1c;
            --text-mid:  #8faa96;
            --text-main: #c8d8cc;
            --inactive:  #1f2421;
            --overlay:   rgba(0, 0, 0, 0.85);
        }

        body { background: var(--bg); font-family: 'IBM Plex Mono', monospace; color: var(--text-main); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Topbar ── */
        .topbar { height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
        .topbar-title { font-size: 11px; letter-spacing: 0.1em; color: var(--text-mid); text-transform: uppercase; }
        .topbar-title span { color: var(--accent); }

        .btn-logout {
            color: var(--accent);
            background: transparent;
            font-size: 10px;
            font-family: inherit;
            border: 1px solid var(--accent-dim);
            padding: 4px 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-logout:hover { background: rgba(61, 220, 132, 0.1); border-color: var(--accent); }

        /* ── Layout ── */
        .app-body { display: flex; flex: 1; overflow: hidden; }
        .main-view { flex: 1; padding: 40px; overflow-y: auto; }

        /* ── Sidebar ── */
        .sidebar { width: 340px; background: var(--surface); border-left: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 30px; overflow-y: auto; }
        .sidebar-section-title { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .override-box { border: 1px dashed var(--yellow); padding: 15px; border-radius: 4px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar-field label { display: block; font-size: 9px; margin-bottom: 5px; color: var(--text-mid); }

        .sidebar-input { background: var(--bg); border: 1px solid var(--border); color: var(--text-main); padding: 10px; border-radius: 4px; font-family: inherit; font-size: 12px; outline: none; width: 100%; }
        .btn-commit { background: var(--yellow); color: #000; border: none; padding: 12px; font-weight: 600; cursor: pointer; border-radius: 3px; text-transform: uppercase; font-size: 11px; width: 100%; transition: opacity 0.2s; }
        .btn-commit:hover { opacity: 0.9; }

        /* ── Tables ── */
        .table-container { border: 1px solid var(--border); background: var(--surface); border-radius: 4px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 12px; color: var(--accent); background: var(--border); text-transform: uppercase; letter-spacing: 0.1em; }
        td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-mid); }

        .user-row { cursor: pointer; transition: background 0.1s; }
        .user-row:hover { background: rgba(61, 220, 132, 0.05); }
        .user-row td { color: var(--text-main); }

        .user-row.active .chevron { transform: rotate(180deg); fill: var(--accent); }
        .chevron { width: 12px; height: 12px; fill: var(--text-mid); transition: transform 0.3s ease; }

        /* ── Dropdown Sessions ── */
        .session-container { display: none; background: #0a0c0b; }
        .session-row { cursor: pointer; transition: all 0.2s; }
        .session-row:hover { background: var(--border); color: var(--yellow); }
        .session-row td:first-child { padding-left: 40px; position: relative; }
        .session-row td:first-child::before { content: '└'; position: absolute; left: 20px; color: var(--border); }

        .status-badge { font-size: 9px; padding: 2px 6px; border-radius: 2px; font-weight: 600; }
        .status-active { background: var(--accent-dim); color: var(--accent); }
        .status-inactive { background: var(--inactive); color: var(--text-mid); }

        /* ── Messaging ── */
        #system-msg { font-size: 10px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 2px; display: none; border-left: 2px solid; }
        .msg-success { color: var(--accent); border-color: var(--accent); }
        .msg-error { color: var(--red); border-color: var(--red); }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-title">SYSTEM // <span>ADMIN_CONSOLE</span></div>
    <div style="flex: 1;"></div>
    <button class="btn-logout" onclick="location.href='/login'">Logout // Terminate →</button>
</header>

<div class="app-body">
    <main class="main-view">
        <h2 style="font-size: 18px; margin-bottom: 25px; letter-spacing:0.05em;">VIEW // USERS</h2>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th style="width: 15%;">Username</th>
                    <th style="width: 20%;">Latest Start</th>
                    <th style="width: 20%;">Latest End</th>
                    <th style="width: 12%;">Logged Time</th>
                    <th style="width: 15%;">Total Pay</th>
                    <th style="width: 15%;">Status</th>
                </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </main>

    <nav class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-section-title">Search User</div>
            <input type="text" id="search-input" class="sidebar-input" placeholder="Search user database..." oninput="filterUsers()">
        </div>

        <div class="override-box">
            <div class="sidebar-section-title" style="color:var(--yellow); border-color: rgba(240,192,64,0.3); margin-bottom:0;">Override</div>
            <div class="sidebar-field">
                <label>TARGET USER</label>
                <input type="text" id="target-user" class="sidebar-input" readonly placeholder="Select a session...">
            </div>
            <div class="sidebar-field">
                <label>START TIMESTAMP</label>
                <input type="text" id="target-start" class="sidebar-input">
            </div>
            <div class="sidebar-field">
                <label>END TIMESTAMP</label>
                <input type="text" id="target-stop" class="sidebar-input">
            </div>
            <div id="system-msg"></div>
            <button class="btn-commit" onclick="commitChanges()">Commit Changes</button>
        </div>
    </nav>
</div>

<script>
    let userData = [];

    window.onload = async () => {
        try {
            const response = await fetch('/api/admin/users');
            userData = await response.json();
            renderTable(userData);
        } catch (err) {
            console.error("Sync Error", err);
        }
    };

    function formatSeconds(seconds) {
        if (!seconds || seconds <= 0) return "0h 0m 0s";
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        return `${h}h ${m}m ${s}s`;
    }

    function showStatus(text, isError = false) {
        const msg = document.getElementById('system-msg');
        msg.innerText = `> ${text}`;
        msg.style.display = 'block';
        msg.className = isError ? 'msg-error' : 'msg-success';
        setTimeout(() => { msg.style.display = 'none'; }, 4000);
    }

    function renderTable(dataToRender) {
        const body = document.getElementById('admin-table-body');
        body.innerHTML = dataToRender.map((user, uIndex) => {
            const sessions = user.sessions || [];
            const latest = sessions.length > 0 ? sessions[0] : { start_time: "--:--:--", end_time: "" };
            const isActive = latest.end_time === "";

            return `
                <tr class="user-row" id="user-row-${uIndex}" onclick="toggleSessions(${uIndex})">
                    <td>${user.username}</td>
                    <td>${latest.start_time}</td>
                    <td>${isActive ? "--:--:--" : latest.end_time}</td>
                    <td>${formatSeconds(user.logged_time)}</td>
                    <td style="color: var(--yellow); font-weight: 600;">$${user.daily_paycheck}</td>
                    <td class="status-cell">
                        <span class="status-badge ${isActive ? 'status-active' : 'status-inactive'}">${isActive ? 'ACTIVE' : 'INACTIVE'}</span>
                        <svg class="chevron" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                    </td>
                </tr>
                <tr id="sessions-${uIndex}" class="session-container">
                    <td colspan="6" style="padding: 0;">
                        <table style="width: 100%; border: none;">
                            <tbody>
                                ${sessions.map((s, sIdx) => `
                                    <tr class="session-row" onclick="loadToSidebar(${uIndex}, ${sIdx})">
                                        <td style="width: 15%;"></td>
                                        <td style="width: 20%;">${s.start_time}</td>
                                        <td style="width: 20%;">${s.end_time || "--:--:--"}</td>
                                        <td style="width: 12%;"></td>
                                        <td style="width: 15%; color: var(--accent); font-weight:500;">$${s.session_pay}</td>
                                        <td style="width: 15%; color: var(--yellow); text-align:right; font-size:9px; padding-right:20px;">[SELECT]</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </td>
                </tr>`;
        }).join('');
    }

    function toggleSessions(index) {
        const el = document.getElementById(`sessions-${index}`);
        const row = document.getElementById(`user-row-${index}`);
        if(!el) return;
        const isVisible = el.style.display === 'table-row';
        el.style.display = isVisible ? 'none' : 'table-row';
        if (isVisible) row.classList.remove('active'); else row.classList.add('active');
    }

    function filterUsers() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = userData.filter(u => u.username.toLowerCase().includes(query));
        renderTable(filtered);
    }

    function loadToSidebar(uIndex, sIndex) {
        window.event.stopPropagation();
        const user = userData[uIndex];
        const session = user.sessions[sIndex];
        document.getElementById('target-user').value = user.username;
        document.getElementById('target-start').value = session.start_time;
        document.getElementById('target-stop').value = session.end_time || "";
    }

    async function commitChanges() {
        const payload = {
            user: document.getElementById('target-user').value,
            start: document.getElementById('target-start').value,
            stop: document.getElementById('target-stop').value
        };

        if(!payload.user) { showStatus("ERROR: NO_USER_SELECTED", true); return; }

        try {
            const response = await fetch('/api/admin/override', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (response.ok) showStatus("COMMAND_EXECUTED: DB_UPDATED");
            else showStatus("ERROR: SERVER_REJECTED", true);
        } catch (err) {
            showStatus("CRITICAL: NETWORK_FAILURE", true);
        }
    }
</script>
</body>
</html>
