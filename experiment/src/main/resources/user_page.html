<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terminal Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0d0f0e;
            --surface:   #141816;
            --border:    #1f2421;
            --accent:    #3ddc84;
            --accent-dim: #1e6e42;
            --red:       #ff5c5c;
            --red-dim:   #6e2020;
            --text-mid:  #8faa96;
        }

        body {
            background: var(--bg);
            font-family: 'IBM Plex Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .topbar {
            display: flex;
            align-items: center;
            height: 48px;
            padding: 0 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .topbar-dots { display: flex; gap: 6px; margin-right: 15px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-r { background: #ff5f57; }
        .dot-y { background: #febc2e; }
        .dot-g { background: #28c840; }

        .topbar-title { color: var(--text-mid); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
        .topbar-title span { color: var(--accent); }

        /* ── Main Body Content ── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .timestamp {
            font-size: 64px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: -0.01em;
            text-transform: uppercase;
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        /* ── Table Styling ── */
        .table-container {
            width: 100%;
            max-width: 850px;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 4px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text-mid);
            font-size: 12px;
        }

        th {
            background: var(--border);
            color: var(--accent);
            text-align: left;
            padding: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(61, 220, 132, 0.05); color: #fff; }

        /* ── Buttons ── */
        .btn {
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 0.15em;
            padding: 16px 40px;
            border-radius: 4px;
            transition: all 0.2s;
            font-weight: 600;
            background: var(--surface);
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-start { color: var(--accent); border: 1px solid var(--accent-dim); }
        .btn-start:hover { background: rgba(61, 220, 132, 0.1); border-color: var(--accent); }

        .btn-stop { color: var(--red); border: 1px solid var(--red-dim); }
        .btn-stop:hover { background: rgba(255, 92, 92, 0.1); border-color: var(--red); }

        .nav-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 0.1em;
            padding: 4px 10px;
            border: 1px solid var(--accent-dim);
            border-radius: 3px;
            transition: all 0.2s;
        }

        .nav-link:hover { background: rgba(61, 220, 132, 0.1); border-color: var(--accent); }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
    </div>
    <div class="topbar-title">SYSTEM // <span>CONSOLE</span></div>
    <div style="flex: 1;"></div>
    <a href="/logs" class="nav-link">VIEW SYSTEM LOGS →</a>
</header>

<main class="main-content">
    <div id="live-clock" class="timestamp">00:00:00</div>

    <div class="button-group">
        <button class="btn btn-start" onclick="sendCommand('start')">Start</button>
        <button class="btn btn-stop" onclick="sendCommand('stop')">Stop</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Total Time</th>
            </tr>
            </thead>
            <tbody id="session-table-body">
            </tbody>
        </table>
    </div>
</main>

<script>
    let activeStartTime = null;
    let clockInterval = null;

    async function sendCommand(action) {
        await fetch(`/api/${action}`, { method: 'POST' });
        loadTableData();
    }

    async function loadTableData() {
        try {
            const response = await fetch('/api/user/data');
            const users = await response.json();
            const tableBody = document.getElementById('session-table-body');

            tableBody.innerHTML = '';
            activeStartTime = null;

            users.forEach(user => {
                const sessionRows = user.sessions.map(session => {
                    if (session.end_time === "") {
                        activeStartTime = session.start_time;
                        return '';
                    }

                    // Use the new Xh Ym Zs format for the table only
                    const duration = calculateDurationTable(session.start_time, session.end_time);

                    return `
                    <tr>
                        <td>${session.start_time}</td>
                        <td>${session.end_time}</td>
                        <td>${duration}</td>
                    </tr>
                `;
                }).join('');

                tableBody.innerHTML += sessionRows;
            });

            handleClockLogic();
        } catch (err) {
            console.error("Table load failed:", err);
        }
    }

    function handleClockLogic() {
        if (clockInterval) clearInterval(clockInterval);
        const clockElement = document.getElementById('live-clock');

        if (!activeStartTime) {
            clockElement.innerText = "00:00:00";
            return;
        }

        const startDateObj = new Date(activeStartTime.replace(' ', 'T'));
        const startTimestamp = startDateObj.getTime();

        const day = String(startDateObj.getDate()).padStart(2, '0');
        const month = startDateObj.toLocaleDateString('en-US', { month: 'short' });
        const sessionDateStr = `${day} ${month}`;

        const updateClock = () => {
            const now = new Date().getTime();
            const diff = now - startTimestamp;

            let timeStr = "00:00:00";
            if (diff > 0) {
                // Keep the standard format for the Big Clock
                timeStr = formatDiffStandard(diff);
            }

            clockElement.innerText = `${sessionDateStr} ${timeStr}`;
        };

        updateClock();
        clockInterval = setInterval(updateClock, 1000);
    }

    function calculateDurationTable(startStr, stopStr) {
        if (!stopStr || stopStr === "") return "--:--:--";
        const start = new Date(startStr.replace(' ', 'T'));
        const stop = new Date(stopStr.replace(' ', 'T'));
        const diff = stop - start;
        return (isNaN(diff) || diff < 0) ? "0h 0m 0s" : formatDiffTable(diff);
    }

    // Format for Big Clock: HH:MM:SS
    function formatDiffStandard(ms) {
        const hh = Math.floor(ms / 3600000).toString().padStart(2, '0');
        const mm = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
        const ss = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
        return `${hh}:${mm}:${ss}`;
    }

    // Format for Table: Xh Ym Zs
    function formatDiffTable(ms) {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        return `${h}h ${m}m ${s}s`;
    }

    window.onload = loadTableData;
</script>
</body>
</html>
